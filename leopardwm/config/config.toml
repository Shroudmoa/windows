# LeopardWM Configuration
# https://github.com/jcardama/LeopardWM

[layout]
# Gap between columns in pixels
gap = 10

# Outer gaps at the edges of the viewport in pixels
outer_gap_left = 10
outer_gap_right = 10
outer_gap_top = 10
outer_gap_bottom = 10

# Width presets (fractions of usable viewport width).
# First preset is used as the default width for new columns.
width_presets = [0.333, 0.5, 0.667]

# Height presets (fractions of column height / weight).
height_presets = [0.333, 0.5, 0.667]

# Centering mode: "center", "just_in_view", or "on_overflow"
# - center: Always center the focused column
# - just_in_view: Only scroll if focused column would be outside viewport
# - on_overflow: Center only when the column is wider than the viewport
centering_mode = "center"

[appearance]
# Colors
active_border_color = "#cba6f7"
inactive_border_color = "#585b70"
background_color = "#1e1e2e"

# Transparency

# Border
border_width = 50

[behavior]
# Automatically focus new windows when they appear
focus_new_windows = true

# Track focus changes from Windows (sync with Alt-Tab, etc.)
track_focus_changes = true

# Log level: trace, debug, info, warn, error
log_level = "error"

# Focus follows mouse (hover to focus)
focus_follows_mouse = false

# Disable Windows 11 Snap Layouts for tiled windows (also disables maximize button)
# disable_snap_layouts = false

# Check GitHub Releases once a day for a newer version. One anonymous HTTPS GET to
# api.github.com on startup + every 24h. Disable to skip entirely.
# check_for_updates = false

# Animate Chromium / Electron / Mozilla / Cascadia windows via DWM thumbnails
# instead of per-frame SetWindowPos during column scrolls. Eliminates the
# 1px wobble and renderer stutter on swap-chain-sensitive apps (Chrome,
# Edge, Slack, Discord, Beeper, Spotify, VS Code, Firefox, Windows Terminal).
# Default on since v0.1.18. Set to false to fall back to the legacy
# per-frame SetWindowPos path.
# swap_chain_ghost_animation = false

# Where newly opened windows go: "new_column" (default, own column to the
# right) or "in_column" (stacked into the focused column).
# new_window_placement = "new_column"

# Hide a window's taskbar button while it isn't visible in the current view
# (on another workspace, or scrolled out of view). Floating and minimized
# windows always keep their button. Default true.
# hide_offscreen_taskbar_buttons = true

[hotkeys]
# Focus
"Alt+H" = "focus_left"
"Alt+L" = "focus_right"
"Alt+K" = "focus_up"
"Alt+J" = "focus_down"
"Alt+Home" = "focus_start"
"Alt+End" = "focus_end"

# Move column
"Alt+Shift+H" = "move_column_left"
"Alt+Shift+L" = "move_column_right"
"Alt+Shift+Home" = "move_column_to_start"
"Alt+Shift+End" = "move_column_to_end"

# Move window to adjacent column
"Alt+left" = "move_window_left"
"Alt+right" = "move_window_right"

# Expel window to a new column
"Ctrl+," = "expel_to_left"
"Ctrl+." = "expel_to_right"

# Stack the neighbor's window into the focused column
"Ctrl+Alt+," = "consume_from_left"
"Ctrl++Alt+." = "consume_from_right"

# Move window within column
"Alt+Shift+K" = "move_window_up"
"Alt+Shift+J" = "move_window_down"

# Column width
"Alt+-" = "cycle_width_down"
"Alt+Shift+-" = "cycle_width_up"
"Alt+0" = "equalize_widths"

# Window height
"Alt+Shift+Win+-" = "cycle_height_down"
"Alt+Shift+Win+=" = "cycle_height_up"
"Alt+Shift+0" = "equalize_heights"

# Monitor focus
#"Alt+Win+," = "focus_monitor_left"
#"Alt+Win+." = "focus_monitor_right"
"Alt+," = "focus_monitor_left"
"Alt+." = "focus_monitor_right"
"Alt+Up" = "focus_monitor_up"
"Alt+Down" = "focus_monitor_down"

# Move window to monitor
"Alt+Shift+," = "move_to_monitor_left"
"Alt+Shift+." = "move_to_monitor_right"
"Alt+Shift+Up" = "move_to_monitor_up"
"Alt+Shift+Down" = "move_to_monitor_down"

# Column layout
"Alt+C" = "center_column"
"Alt+M" = "maximize_column"

# Window
"Alt+W" = "close_window"
"Alt+F" = "toggle_floating"
"Alt+Shift+F" = "toggle_fullscreen"
"Alt+T" = "toggle_tabbed"
"Alt+S" = "scratchpad_toggle"
"Alt+Shift+S" = "scratchpad_stash"
"Alt+Y" = "toggle_sticky"

# Session
"Alt+P" = "toggle_pause"
"Alt+R" = "refresh"
"Alt+Shift+R" = "reload"
"Win+Ctrl+Escape" = "panic_revert"

# Workspaces
"Alt+Space" = "toggle_overview"
"Alt+Shift+Left" = "workspace_prev"
"Alt+Shift+Right" = "workspace_next"

# Switch to workspace
"Alt+1" = "switch_workspace_1"
"Alt+2" = "switch_workspace_2"
"Alt+3" = "switch_workspace_3"
"Alt+4" = "switch_workspace_4"
"Alt+5" = "switch_workspace_5"
"Alt+6" = "switch_workspace_6"
"Alt+7" = "switch_workspace_7"
"Alt+8" = "switch_workspace_8"
"Alt+9" = "switch_workspace_9"

# Move window to workspaceµµ
"Alt+Shift+1" = "move_to_workspace_1"
"Alt+Shift+2" = "move_to_workspace_2"
"Alt+Shift+3" = "move_to_workspace_3"
"Alt+Shift+4" = "move_to_workspace_4"
"Alt+Shift+5" = "move_to_workspace_5"
"Alt+Shift+6" = "move_to_workspace_6"
"Alt+Shift+7" = "move_to_workspace_7"
"Alt+Shift+8" = "move_to_workspace_8"
"Alt+Shift+9" = "move_to_workspace_9"

[gestures]
# Touchpad gesture support
enabled = true
swipe_left = "focus_left"
swipe_right = "focus_right"
swipe_up = "focus_up"
swipe_down = "focus_down"

[snap_hints]
# Visual snap hint overlays during resize
enabled = true
duration_ms = 200
opacity = 128

[animation]
# Animation timing. Durations in milliseconds; 0 = snap instantly.
# easing accepts "linear" | "ease_in" | "ease_out" | "ease_in_out".
layout_duration_ms = 150            # column move / resize / tab changes
workspace_switch_duration_ms = 200  # switching workspaces
scroll_duration_ms = 200            # scrolling a column into view
overview_duration_ms = 150          # overview open/close zoom
easing = "ease_out"
# Skip animations while on battery / Windows power saver (saves power).
# Set false to keep animations on battery. The Windows "show animations"
# accessibility setting is always honored regardless.
reduce_motion_on_battery = true

[overview]
# Workspace overview card bodies: "live" (default) shows DWM window
# previews (last frame for windows on hidden workspaces); "snapshot"
# shows a frame captured right before each window left the screen
# (icon until one exists); "placeholder" keeps the static app-icon
# bodies.
# render = "live"

[workspaces]
# Optional display names for workspaces 1-9, by position. Shown in
# `lwm query workspace` and pushed to bars over IPC. Leave an entry empty
# ("") to keep that workspace's number. Omit the list to name nothing.
# names = ["web", "code", "chat", "media"]

# Built-in example: Firefox / Zen Picture-in-Picture popups draw their own
# square frame, so we override the focus-border corner style to match. Edit
# or remove freely — corner_style accepts "square" | "rounded" | "small_rounded".
[[window_rules]]
match_class = "MozillaDialogClass"
corner_style = "square"

